metallb:
  controller:
    labels:
      app: metallb-controller
      env: dev

    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 256Mi

  speaker:
    labels:
      app: metallb-speaker
      env: dev

    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 256Mi

    frr:
      labels:
        app: metallb-speaker-frr
        env: dev

      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          cpu: 200m
          memory: 128Mi

    reloader:
      labels:
        app: metallb-speaker-reloader
        env: dev

      resources:
        requests:
          cpu: 25m
          memory: 32Mi
        limits:
          cpu: 100m
          memory: 64Mi

    frrMetrics:
      labels:
        app: metallb-speaker-frr-metrics
        env: dev

      resources:
        requests:
          cpu: 25m
          memory: 32Mi
        limits:
          cpu: 100m
          memory: 64Mi

    initContainers:
      cpFrrFiles:
        labels:
          env: dev

        resources:
          requests:
            cpu: 10m
            memory: 16Mi
          limits:
            cpu: 50m
            memory: 32Mi

      cpReloader:
        labels:
          env: dev

        resources:
          requests:
            cpu: 10m
            memory: 16Mi
          limits:
            cpu: 50m
            memory: 32Mi

      cpMetrics:
        labels:
          env: dev

        resources:
          requests:
            cpu: 10m
            memory: 16Mi
          limits:
            cpu: 50m
            memory: 32Mi