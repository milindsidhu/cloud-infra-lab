{{- range .Values.namespaces }}
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ . }}-role-binding
  namespace: {{ . }}
subjects:
  - kind: ServiceAccount
    name: sa-{{ . }}
    namespace: {{ . }}
roleRef:
  kind: Role
  name: role-{{ . }}
  apiGroup: rbac.authorization.k8s.io
---
{{- end }}
