# Source: namespace-rbac/templates/dockerSecretReplicator.yaml
# Deployment per namespace with name: <passed-name>-<namespace>
apiVersion: apps/v1
kind: Deployment
metadata:
  name: secret-replicator-lang-app
  namespace: lang-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: secret-replicator
  template:
    metadata:
      labels:
        app: secret-replicator
    spec:
      serviceAccountName: sa-lang-app
      imagePullSecrets:
        - name: my-docker-secret
      containers:
        - name: operator
          image: milindsidhu/secret-replicator:v1.0.0
          command: ["kopf", "run", "--namespace=$(NAMESPACE)", "--standalone", "operator.py"]
          imagePullPolicy: Always
          env:
            - name: LOG_LEVEL
              value: "info"
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: METRICS_ENABLED
              value: "true"
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
---
