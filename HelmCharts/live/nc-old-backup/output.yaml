# Source: namespace-rbac/templates/preDeleteFinalizerPatch.yaml
apiVersion: batch/v1
kind: Job
metadata:
  name: cleanup-kopf-finalizer-lang-app
  namespace: lang-app
  annotations:
    "helm.sh/hook": pre-delete
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": hook-succeeded
    # "argocd.argoproj.io/hook": PreSync
    # "argocd.argoproj.io/hook-delete-policy": HookSucceeded
    # "argocd.argoproj.io/sync-options": Skip=true
spec:
  template:
    spec:
      restartPolicy: OnFailure
      serviceAccountName: sa-lang-app
      containers:
        - name: finalizer-remover
          image: bitnami/kubectl:latest
          command:
            - /bin/sh
            - -c
            - |
              echo "Removing Kopf finalizer from CR in lang-app..."
              if kubectl get secretreplicator.kopf.dev secret-replicator-cr-lang-app -n lang-app &>/dev/null; then
                kubectl patch secretreplicator.kopf.dev secret-replicator-cr-lang-app -n lang-app --type=merge -p '{"metadata":{"finalizers":[]}}'
              else
                echo "Resource secret-replicator-cr-lang-app not found, skipping patch"
              fi
              echo "Deleting SecretReplicator CRD..."
              kubectl delete crd secretreplicators.kopf.dev --ignore-not-found
              echo "Cleanup completed for lang-app."
---
