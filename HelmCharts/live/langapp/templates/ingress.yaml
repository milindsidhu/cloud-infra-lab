{{- if .Values.runnerApi.ingress.enabled }}
{{- range $ns := .Values.namespaces }}
{{- range $env := $.Values.environment }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ printf "%s-%s-%s" $.Values.runnerApi.name $env $ns }}
  namespace: {{ $ns }}
  annotations:
{{- if $.Values.runnerApi.certManager.enabled }}
    cert-manager.io/cluster-issuer: {{ $.Values.runnerApi.certManager.clusterIssuer }}
{{- end }}
    nginx.ingress.kubernetes.io/use-regex: "true"
    # nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/backend-protocol: "HTTPS"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
{{- if $.Values.runnerApi.externaldns.enabled }}
    external-dns.alpha.kubernetes.io/cloudflare-proxied: "true"
    external-dns.alpha.kubernetes.io/hostname: {{ if ne $env "prod" }}{{ printf "%s-%s" $env $.Values.runnerApi.ingress.host }}{{ else }}{{ $.Values.runnerApi.ingress.host }}{{ end }}
    external-dns.alpha.kubernetes.io/target: {{ $.Values.runnerApi.externaldns.cloudflare.target }}
{{- end }}
spec:
  ingressClassName: nginx
{{- if $.Values.runnerApi.certManager.enabled }}
  tls:
    - secretName: {{ $.Values.runnerApi.ingress.tlsSecret }}-{{ $ns }}
      hosts:
        - {{ if ne $env "prod" }}{{ printf "%s-%s" $env $.Values.runnerApi.ingress.host }}{{ else }}{{ $.Values.runnerApi.ingress.host }}{{ end }}
{{- end }}
  rules:
    - host: {{ if ne $env "prod" }}{{ printf "%s-%s" $env $.Values.runnerApi.ingress.host }}{{ else }}{{ $.Values.runnerApi.ingress.host }}{{ end }}
      http:
        paths:
          - path: /static/index.html
            pathType: Exact
            backend:
              service:
                name: {{ if ne $env "prod" }}{{ printf "%s-%s-%s" $.Values.runnerApi.name $env $ns }}{{ else }}{{ printf "%s-%s" $.Values.runnerApi.name $ns }}{{ end }}
                port:
                  number: {{ $.Values.runnerApi.servicePort }}
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ if ne $env "prod" }}{{ printf "%s-%s-%s" $.Values.runnerApi.name $env $ns }}{{ else }}{{ printf "%s-%s" $.Values.runnerApi.name $ns }}{{ end }}
                port:
                  number: {{ $.Values.runnerApi.servicePort }}
---
{{- end }}
{{- end }}
{{- end }}
