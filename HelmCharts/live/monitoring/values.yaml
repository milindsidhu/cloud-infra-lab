kube-prometheus-stack:
  # ── Grafana ───────────────────────────────────────────────────────
  grafana:
    enabled: true
    adminUser: admin
    adminPassword: ""     # set via existingSecret below
    admin:
      existingSecret: grafana-admin-secret
      userKey: username
      passwordKey: password
    persistence:
      enabled: true
      storageClassName: local-path
      size: 2Gi
    ingress:
      enabled: false
    service:
      type: ClusterIP
      port: 80
    podLabels:
      app: grafana
      env: monitoring
    resources:
      requests:
        memory: "256Mi"
        cpu: "100m"
      limits:
        memory: "512Mi"
        cpu: "300m"
    grafana.ini:
      server:
        root_url: https://grafana.solidshop.in
      auth:
        disable_login_form: false
      security:
        allow_embedding: true

  # ── Prometheus ────────────────────────────────────────────────────
  prometheus:
    enabled: true
    prometheusSpec:
      retention: 7d
      retentionSize: "2GB"
      storageSpec:
        volumeClaimTemplate:
          spec:
            storageClassName: local-path
            accessModes: ["ReadWriteOnce"]
            resources:
              requests:
                storage: 2Gi
      podMetadata:
        labels:
          app: prometheus
          env: monitoring
      resources:
        requests:
          memory: "512Mi"
          cpu: "200m"
        limits:
          memory: "1Gi"
          cpu: "500m"

  # ── Alertmanager ─────────────────────────────────────────────────
  alertmanager:
    enabled: true
    alertmanagerSpec:
      storage:
        volumeClaimTemplate:
          spec:
            storageClassName: local-path
            accessModes: ["ReadWriteOnce"]
            resources:
              requests:
                storage: 1Gi
      podMetadata:
        labels:
          app: alertmanager
          env: monitoring
      resources:
        requests:
          memory: "64Mi"
          cpu: "50m"
        limits:
          memory: "128Mi"
          cpu: "100m"
    config:
      global:
        resolve_timeout: 5m
        slack_api_url: ""
      route:
        group_by: ['alertname', 'namespace']
        group_wait: 30s
        group_interval: 5m
        repeat_interval: 12h
        receiver: slack
        routes:
          - receiver: slack
            matchers:
              - alertname =~ ".*"
      receivers:
        - name: slack
          slack_configs:
            - channel: '#alerts'
              send_resolved: true
              title: '{{ template "slack.default.title" . }}'
              text: '{{ template "slack.default.text" . }}'
      templates:
        - '/etc/alertmanager/config/*.tmpl'

  # ── Node Exporter ─────────────────────────────────────────────────
  nodeExporter:
    enabled: true

  prometheus-node-exporter:
    podLabels:
      jobLabel: node-exporter
      app: node-exporter
      env: monitoring
    resources:
      requests:
        memory: "50Mi"
        cpu: "50m"
      limits:
        memory: "100Mi"
        cpu: "100m"

  # ── Kube State Metrics ────────────────────────────────────────────
  kubeStateMetrics:
    enabled: true

  kube-state-metrics:
    podLabels:
      app: kube-state-metrics
      env: monitoring
    resources:
      requests:
        memory: "100Mi"
        cpu: "50m"
      limits:
        memory: "200Mi"
        cpu: "100m"

  # ── Prometheus Operator ───────────────────────────────────────────
  prometheusOperator:
    enabled: true
    podLabels:
      env: monitoring
    resources:
      requests:
        memory: "128Mi"
        cpu: "100m"
      limits:
        memory: "256Mi"
        cpu: "200m"