---
# Source: cloudflared/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: argocd-tunnel
  namespace: cloudflared
  labels:
    app: argocd-tunnel
    chart: cloudflared-1.0.0
spec:
  replicas: 1
  selector:
    matchLabels:
      app: argocd-tunnel
  template:
    metadata:
      labels:
        app: argocd-tunnel
    spec:
      serviceAccountName: sa-cloudflared
      imagePullSecrets:
        - name: my-registry-secret
      containers:
        - name: cloudflared
          image: "cloudflare/cloudflared:2025.4.0"
          imagePullPolicy: IfNotPresent
          args:
            - tunnel
            - --config
            - /etc/cloudflared/config/config.yaml
            - --metrics
            - 0.0.0.0:2000
            - run
          volumeMounts:
            - name: config
              mountPath: /etc/cloudflared/config
              readOnly: true
            - name: creds
              mountPath: /etc/cloudflared
              readOnly: true
          livenessProbe:
            httpGet:
              path: /ready
              port: 2000
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 5
          resources:
            requests:
              memory: 64Mi
              cpu: 50m
            limits:
              memory: 128Mi
              cpu: 200m
      volumes:
        - name: config
          configMap:
            name: argocd-cloudflared-config
        - name: creds
          secret:
            secretName: argocd-tunnel-credentials
