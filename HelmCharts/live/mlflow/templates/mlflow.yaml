apiVersion: apps/v1
kind: Deployment
metadata:
  name: mlflow
  namespace: mlflow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mlflow
  template:
    metadata:
      labels:
        app: mlflow
    spec:
      containers:
        - name: mlflow
          image: ghcr.io/mlflow/mlflow:v2.13.0
          command:
            - /bin/sh
            - -c
          args:
            - |
              pip install --no-cache-dir psycopg2-binary boto3 && \
              exec mlflow server \
                --host=0.0.0.0 \
                --port=5000 \
                --workers=1 \
                --backend-store-uri=postgresql://mlflow:mlflow123@mlflow-postgresql.mlflow.svc.cluster.local:5432/mlflow \
                --default-artifact-root=s3://mlflow \
                --serve-artifacts
          env:
            - name: MLFLOW_S3_ENDPOINT_URL
              value: http://mlflow-minio.mlflow.svc.cluster.local:9000
            - name: AWS_ACCESS_KEY_ID
              value: minio
            - name: AWS_SECRET_ACCESS_KEY
              value: minio123
          ports:
            - containerPort: 5000
          resources:
            requests:
              memory: 512Mi
            limits:
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 30
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: mlflow
  namespace: mlflow
spec:
  selector:
    app: mlflow
  ports:
    - port: 5000
      targetPort: 5000