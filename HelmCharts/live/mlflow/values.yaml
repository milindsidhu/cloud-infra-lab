minio:
  mode: standalone          # critical — avoids 4-replica distributed mode
  rootUser: minio
  rootPassword: minio123

  replicas: 1

  buckets:
    - name: mlflow          # auto-creates the bucket MLflow needs
      policy: none
      purge: false

  persistence:
    enabled: true
    size: 10Gi

  resources:
    requests:
      memory: 256Mi
    limits:
      memory: 512Mi

postgresql:
  auth:
    database: mlflow
    username: mlflow
    password: mlflow123

  primary:
    resources:
      requests:
        memory: 256Mi
      limits:
        memory: 512Mi