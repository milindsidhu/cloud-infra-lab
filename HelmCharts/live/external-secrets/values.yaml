external-secrets:
  installCRDs: true

  podLabels:
    app: external-secrets
    env: dev

  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "200m"
      memory: "256Mi"

  webhook:
    podLabels:
      app: external-secrets-webhook
      env: dev
    resources:
      requests:
        cpu: "50m"
        memory: "64Mi"
      limits:
        cpu: "100m"
        memory: "128Mi"

  certController:
    podLabels:
      app: external-secrets-cert-controller
      env: dev
    resources:
      requests:
        cpu: "50m"
        memory: "64Mi"
      limits:
        cpu: "100m"
        memory: "128Mi"
