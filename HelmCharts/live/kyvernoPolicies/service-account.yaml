apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-namespace-service-account
  annotations:
    pod-policies.kyverno.io/autogen-controllers: none
    policies.kyverno.io/title: Require Namespace-Specific Service Account
    policies.kyverno.io/severity: medium
    policies.kyverno.io/description: >-
      Pods in app namespaces (policy-scope=enforced) must use the
      service account sa-<namespace> created by the namespace-controller
      template. Namespaces in regulatedNoSANamespaces (cluster-scoped
      operators that ship their own ServiceAccount/ClusterRole) are
      excluded from THIS policy only — they remain fully in scope for
      require-labels and require-resource-limits.
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: check-namespace-service-account
      match:
        any:
        - resources:
            kinds:
              - Pod
            namespaceSelector:
              matchLabels:
                policy-scope: enforced
      exclude:
        any:
        - resources:
            namespaces:
              # system / platform namespaces
              - kube-system
              - kube-public
              - kube-node-lease
              - argocd
              - kyverno
              - cert-manager
              - cloudflared
              - local-path-storage
              # regulatedNoServiceAccountNamespaces — must match values.yaml exactly
              - monitoring
              # - metallb
              - ingress-nginx
              - actions-runner-system
              - external-secrets
              - mittwald-replicator
              - istio-system
      skipBackgroundRequests: true
      validate:
        allowExistingViolations: true
        message: >-
          Pods must use the service account 'sa-{{request.object.metadata.namespace}}'
          created by the namespace-controller template. Found:
          '{{request.object.spec.serviceAccountName}}'.
        pattern:
          spec:
            serviceAccountName: "sa-{{request.object.metadata.namespace}}"