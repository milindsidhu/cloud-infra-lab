apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "splunk-lab.fullname" . }}-control
  labels:
    {{- include "splunk-lab.labels" . | nindent 4 }}
    app.kubernetes.io/component: control-panel
spec:
  replicas: {{ .Values.controlPanel.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: control-panel
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: control-panel
    spec:
      volumes:
        - name: nginx-conf
          configMap:
            name: {{ include "splunk-lab.fullname" . }}-nginx-conf
      containers:
        - name: control-panel
          image: {{ include "splunk-lab.controlImage" . }}
          imagePullPolicy: {{ .Values.controlPanel.image.pullPolicy }}
          ports:
            - containerPort: 80
          volumeMounts:
            - name: nginx-conf
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            {{- toYaml .Values.controlPanel.resources | nindent 12 }}
