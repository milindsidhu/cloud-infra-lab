{{- if .Values.splunkEnterprise.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "splunk-lab.fullname" . }}-splunk
  labels:
    {{- include "splunk-lab.labels" . | nindent 4 }}
    app.kubernetes.io/component: splunk-enterprise
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: splunk-enterprise
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: splunk-enterprise
    spec:
      volumes:
        - name: splunk-data
          persistentVolumeClaim:
            claimName: {{ include "splunk-lab.fullname" . }}-splunk-data
      containers:
        - name: splunk
          image: splunk/splunk:{{ .Values.splunkEnterprise.image.tag }}
          imagePullPolicy: {{ .Values.splunkEnterprise.image.pullPolicy }}
          env:
            - name: SPLUNK_START_ARGS
              value: "--accept-license"
            - name: SPLUNK_PASSWORD
              value: {{ .Values.splunkEnterprise.adminPassword | quote }}
            - name: SPLUNK_LICENSE_URI
              value: "Free"
          ports:
            - name: web
              containerPort: 8000
            - name: receiver
              containerPort: 9997
            - name: hec
              containerPort: 8088
            - name: mgmt
              containerPort: 8089
          volumeMounts:
            - name: splunk-data
              mountPath: /opt/splunk/var
          readinessProbe:
            httpGet:
              path: /en-US/account/login
              port: 8000
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: 10
          livenessProbe:
            httpGet:
              path: /en-US/account/login
              port: 8000
            initialDelaySeconds: 90
            periodSeconds: 20
            failureThreshold: 5
          resources:
            {{- toYaml .Values.splunkEnterprise.resources | nindent 12 }}
{{- end }}
