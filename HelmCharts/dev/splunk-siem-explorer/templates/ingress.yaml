{{- if .Values.frontend.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "splunk-siem-explorer.fullname" . }}
  labels:
    {{- include "splunk-siem-explorer.labels" . | nindent 4 }}
  {{- if .Values.frontend.ingress.className }}
  annotations:
    kubernetes.io/ingress.class: {{ .Values.frontend.ingress.className }}
  {{- end }}
spec:
  {{- if .Values.frontend.ingress.className }}
  ingressClassName: {{ .Values.frontend.ingress.className }}
  {{- end }}
  {{- if .Values.frontend.ingress.tls }}
  tls:
    - hosts:
        - {{ .Values.frontend.ingress.host }}
      secretName: {{ include "splunk-siem-explorer.fullname" . }}-tls
  {{- end }}
  rules:
    - host: {{ .Values.frontend.ingress.host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "splunk-siem-explorer.fullname" . }}-frontend
                port:
                  number: {{ .Values.frontend.service.port }}
{{- end }}
