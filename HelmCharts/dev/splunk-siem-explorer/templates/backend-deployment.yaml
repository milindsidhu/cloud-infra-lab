apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "splunk-siem-explorer.fullname" . }}-backend
  labels:
    {{- include "splunk-siem-explorer.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  replicas: {{ .Values.backend.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: backend
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: backend
    spec:
      initContainers:
        - name: wait-for-postgres
          image: busybox
          command:
            - sh
            - -c
            - |
              until nc -z {{ include "splunk-siem-explorer.fullname" . }}-postgres {{ .Values.postgresql.service.port }}; do
                echo "Waiting for postgres..."
                sleep 2
              done
      containers:
        - name: backend
          image: {{ include "splunk-siem-explorer.backendImage" . }}
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "splunk-siem-explorer.fullname" . }}-secret
                  key: database-url
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}
