apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "splunk-siem-explorer.fullname" . }}-nginx-conf
  labels:
    {{- include "splunk-siem-explorer.labels" . | nindent 4 }}
data:
  default.conf: |
    server {
        listen 80;
        root /usr/share/nginx/html;
        index index.html;

        location / {
            try_files $uri $uri/ /index.html;
        }

        location /api/ {
            proxy_pass http://{{ include "splunk-siem-explorer.fullname" . }}-backend:{{ .Values.backend.service.port }}/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /health {
            proxy_pass http://{{ include "splunk-siem-explorer.fullname" . }}-backend:{{ .Values.backend.service.port }}/health;
        }

        gzip on;
        gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;
    }
