name: A Workflow for Terraform
on:
  workflow_dispatch:
    branches:
      - 'main'
    inputs:
      run_plan:
        description: "Set to true to run the TF PLAN, false to skip."
        required: true
        default: "false"  # Default value can be "true" or "false"
        type: choice
        options:
          - "true"
          - "false"
      run_apply:
        description: "Set to true to run the TF APPLY, false to skip."
        required: true
        default: "false"  # Default value can be "true" or "false"
        type: choice
        options:
          - "true"
          - "false"
      run_destroy:
        description: "Set to true to run the TF DESTROY, false to skip."
        required: true
        default: "false"  # Default value can be "true" or "false"
        type: choice
        options:
          - "true"
          - "false"
      github_runner:
        description: "Choose the Github Runner"
        required: true
        default: "ubuntu-latest"
        type: choice
        options:
          - "ubuntu-latest"
          - "self-hosted"
  push:
    branches:
      - 'testing'


env:
  TF_VAR_ARM_CLIENT_ID: ${{ secrets.TF_VAR_ARM_CLIENT_ID }}
  TF_VAR_ARM_CLIENT_SECRET: ${{ secrets.TF_VAR_ARM_CLIENT_SECRET }}
  TF_VAR_ARM_TENANT_ID: ${{ secrets.TF_VAR_ARM_TENANT_ID }}
  TF_VAR_ARM_SUBSCRIPTION_ID: ${{ secrets.TF_VAR_ARM_SUBSCRIPTION_ID }}
  ARM_CLIENT_ID: ${{ secrets.TF_VAR_ARM_CLIENT_ID }}
  ARM_CLIENT_SECRET: ${{ secrets.TF_VAR_ARM_CLIENT_SECRET }}
  ARM_TENANT_ID: ${{ secrets.TF_VAR_ARM_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.TF_VAR_ARM_SUBSCRIPTION_ID }}

jobs:
  # Terraform Apply Stage
  tf_plan:
    # runs-on: ['self-hosted', 'Linux' ]
    runs-on: ${{ github.ref == 'refs/heads/main' && inputs.github_runner || 'ubuntu-latest' }}
    if: always()  
    defaults:
      run:
        shell: bash
        working-directory: "${{ github.workspace }}/Terraform/ecom"

    steps:
      - name: "Checkout the Repository"
        uses: actions/checkout@v4
        id: checkout
    
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: "Setup Terraform"
        uses: hashicorp/setup-terraform@v3
        id: setupTerraform

# #### not working on selfhosted ####

#       # - name: "Azure Login"
#       #   uses: azure/login@v2
#       #   id: azureLogin
#       #   with:
#       #     creds: '{
#       #               "clientId": "${{ secrets.TF_VAR_ARM_CLIENT_ID }}",
#       #               "tenantId": "${{ secrets.TF_VAR_ARM_TENANT_ID }}",
#       #               "subscriptionId": "${{ secrets.TF_VAR_ARM_SUBSCRIPTION_ID }}",
#       #               "clientSecret": "${{ secrets.TF_VAR_ARM_CLIENT_SECRET }}"
#       #             }'

      - name: Azure Login
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
                      az login --service-principal \
                      -t "${{ secrets.TF_VAR_ARM_TENANT_ID }}" \
                      -u "${{ secrets.TF_VAR_ARM_CLIENT_ID }}" \
                      -p "${{ secrets.TF_VAR_ARM_CLIENT_SECRET }}" 
                      az account set -s "${{ secrets.TF_VAR_ARM_SUBSCRIPTION_ID }}" 

      - name: Modify the Backend StateFile Path
        run: |
              sed -i "s|path = \"\"|path = \"$HOME/WORKSPACE/StateFileStorage/terraform.tfstate\"|" backend.tf                
      
      - name: "Terraform Init"
        id: init
        run: terraform init
        
      - name: "Terraform Format"
        id: tfFormat
        run: terraform fmt -recursive

      - name: Terraform Validate
        id: validate
        run: terraform validate -no-color

      - name: Terraform Plan
        id: plan
        run: |
              terraform plan -out=planOutput
              echo "Showing the Terraform Plan"
              terraform show planOutput

      - name: "Upload TF Plan Output"
        uses: actions/upload-artifact@v4
        with:
          name: planOutput
          path: "${{ github.workspace }}/Terraform/ecom/planOutput"
          compression-level: 0

# ##### NOT IN USE #####
          
