#       #   run: |
#       #         DATE=$(date +'%Y%m%d')
#       #         CUSTOM_SSH_KEY_PATH="$HOME/.ssh/temp_linux_to_mac_key_$DATE"
#       #         KEYNAME=temp_linux_to_mac_key_$DATE
        
#       #         # Remove the generated keys
#       #         rm -f "$CUSTOM_SSH_KEY_PATH" "$CUSTOM_SSH_KEY_PATH.pub"  
        
#       #         # Restore the known_hosts file if a backup exists
#       #         if [ -f "$HOME/.ssh/known_hosts.bak_$DATE" ]; then
#       #             mv "$HOME/.ssh/known_hosts.bak_$DATE" "$HOME/.ssh/known_hosts"  # Restore the backup
#       #             echo "Restored known_hosts from known_hosts.bak_$DATE"
#       #         else
#       #             echo "No backup of known_hosts found to restore."
#       #         fi
        
#       #         # Restore the authorized_keys file if a backup exists
#       #         if [ -f "$HOME/.ssh/authorized_keys.bak_$DATE" ]; then
#       #             mv "$HOME/.ssh/authorized_keys.bak_$DATE" "$HOME/.ssh/authorized_keys"  # Restore the backup
#       #             echo "Restored authorized_keys from authorized_keys.bak_$DATE"
#       #         else
#       #             echo "No backup of authorized_keys found to restore."
#       #         fi

  # Terraform Apply Stage
  tf_apply:
    # runs-on: ['self-hosted', 'Linux' ]
    runs-on: ${{ github.ref == 'refs/heads/main' && inputs.github_runner || 'ubuntu-latest' }}
    if: ${{ inputs.run_apply == 'true' }}
    needs: tf_plan
    defaults:
      run:
        shell: bash
        working-directory: "${{ github.workspace }}/Terraform/ecom/"
        
    steps:
      - name: "Checkout the Repository"
        uses: actions/checkout@v4
        id: checkout

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: "Setup Terraform"
        uses: hashicorp/setup-terraform@v3
        id: setupTerraform
  
      - name: Azure Login
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
                      az login --service-principal \
                      -t "${{ secrets.TF_VAR_ARM_TENANT_ID }}" \
                      -u "${{ secrets.TF_VAR_ARM_CLIENT_ID }}" \
                      -p "${{ secrets.TF_VAR_ARM_CLIENT_SECRET }}" 
                      az account set -s "${{ secrets.TF_VAR_ARM_SUBSCRIPTION_ID }}" 
      
      - name: Modify the Backend StateFile Path
        run: |
              sed -i "s|path = \"\"|path = \"$HOME/WORKSPACE/StateFileStorage/terraform.tfstate\"|" backend.tf

      - name: "Download TF Plan"
        uses: actions/download-artifact@v4
        with: 
          name: planOutput
          path: "${{ github.workspace }}/Terraform/ecom/planOutput"

      - name: Extract Plan
        run: |
              mv ${{ github.workspace }}/Terraform/ecom/planOutput/planOutput ${{ github.workspace }}/Terraform/ecom/planOUTPUT

      - name: "Terraform Init"
        id: init
        run: terraform init

      - name: Show Terraform Plan
        run: terraform show planOUTPUT

      - name: Terraform Apply
        run: terraform apply -auto-approve planOUTPUT

  # Terraform Destroy Stage
  tf_destroy:
    # runs-on: ['self-hosted', 'Linux' ]
    runs-on: ${{ github.ref == 'refs/heads/main' && inputs.github_runner || 'ubuntu-latest' }}
    if: ${{ inputs.run_destroy == 'true' }}
    needs: tf_apply
    defaults:
      run:
        shell: bash
        working-directory: "${{ github.workspace }}/Terraform/ecom/"
        
    steps:
      - name: "Checkout the Repository"
        uses: actions/checkout@v4
        id: checkout

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: "Setup Terraform"
        uses: hashicorp/setup-terraform@v3
        id: setupTerraform
  
      - name: Azure Login
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
                      az login --service-principal \
                      -t "${{ secrets.TF_VAR_ARM_TENANT_ID }}" \
                      -u "${{ secrets.TF_VAR_ARM_CLIENT_ID }}" \
                      -p "${{ secrets.TF_VAR_ARM_CLIENT_SECRET }}" 
                      az account set -s "${{ secrets.TF_VAR_ARM_SUBSCRIPTION_ID }}" 

      - name: Modify the Backend StateFile Path
        run: |
              sed -i "s|path = \"\"|path = \"$HOME/WORKSPACE/StateFileStorage/terraform.tfstate\"|" backend.tf
      
      - name: "Terraform Init"
        id: init
        run: terraform init

      - name: Show Terraform Plan
        run: |
              terraform plan -destroy -out=planDestroyOutput
              terraform show planDestroyOutput

      - name: Terraform Destroy
        run: terraform apply -auto-approve planDestroyOutput
