name: Create AWS Credentials Secret

on:
  workflow_dispatch:

jobs:
  create-secret:
    runs-on: self-hosted
    steps:
      - uses: azure/setup-kubectl@v4.0.0
        with:
          version: 'latest'

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.K8S_CONFIG_2026 }}" > ~/.kube/config

      - name: Create aws-credentials secret
        run: |
          kubectl create secret generic aws-credentials \
            --from-literal=access-key=${{ secrets.AWS_ACCESS_KEY_ID }} \
            --from-literal=secret-key=${{ secrets.AWS_SECRET_ACCESS_KEY }} \
            -n external-secrets \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Verify
        run: |
          kubectl get secret aws-credentials -n external-secrets