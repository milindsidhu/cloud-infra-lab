
# Do NOT CREAT A CERTIFICATE, USE GLOBAL CERT CREATED PER NAMESPACE
# CREATE BY USING THE FILE IN ""

---
# nginx app deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx  
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
      - name: nginx
        image: nginx
        ports:
        - containerPort: 80

---
# create a service
apiVersion: v1
kind: Service
metadata:
  name: nginx  
spec:
  type: ClusterIP
  ports:
  - port: 80
  selector:
    app: nginx

---
# create a ingress
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ingress-for-ngnix
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - nginx<domain>
    secretName: multi-cert-self-secret # Use the actual issued secret
  rules:
  - host: nginx<domain>
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: nginx
            port:
              number: 80
