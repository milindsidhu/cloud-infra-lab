cat <<EOF | kubectl apply -f -
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: selfsigned-bootstrap
spec:
  selfSigned: {}
EOF

cat <<EOF | kubectl apply -f -
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: roles-anywhere-root-ca
  namespace: cert-manager
spec:
  isCA: true
  commonName: RolesAnywhereRootCA
  secretName: roles-anywhere-root-ca
  issuerRef:
    name: selfsigned-bootstrap
    kind: ClusterIssuer
EOF

cat <<EOF | kubectl apply -f -
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: roles-anywhere-ca
spec:
  ca:
    secretName: roles-anywhere-root-ca
EOF

cat <<EOF | kubectl apply -f -
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: external-secrets-workload
  namespace: external-secrets
spec:
  secretName: external-secrets-workload
  commonName: external-secrets
  issuerRef:
    name: roles-anywhere-ca
    kind: ClusterIssuer
EOF


cat <<EOF | kubectl apply -f -
apiVersion: v1
kind: Secret
metadata:
  name: aws-creds
  namespace: external-secrets
type: Opaque
stringData:
  access-key: ### key here
  secret-access-key: ### secret here
EOF

cat <<EOF | kubectl apply -f -
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: aws-secretsmanager
spec:
  provider:
    aws:
      service: SecretsManager
      region: ap-south-1
      role: arn:aws:iam::393503701266:role/eso-user-trust-role
      auth:
        secretRef:
          accessKeyIDSecretRef:
            name: aws-creds
            key: access-key
            namespace: external-secrets
          secretAccessKeySecretRef:
            name: aws-creds
            key: secret-access-key
            namespace: external-secrets
EOF


# test

cat <<EOF | kubectl apply -f -
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: ghub-token
  namespace: default
spec:
  refreshInterval: 1h

  secretStoreRef:
    name: aws-secretsmanager
    kind: ClusterSecretStore

  target:
    name: ghub-token

  data:
    - secretKey: token
      remoteRef:
        key: ghub-token
EOF