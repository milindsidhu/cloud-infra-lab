apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: namespace-controller
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/milindsidhu/Projects.git
    path: HelmCharts/live/namespaceController
    targetRevision: dev/MS

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      enabled: true
      prune: true
      selfHeal: true

    syncOptions:
      - ServerSideApply=true

  revisionHistoryLimit: 5
